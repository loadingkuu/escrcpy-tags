name: release-assets

# 打 tag（如 v2.11.2）或在 Actions 里手动运行，即自动构建 Windows 版并发布到 Release。
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.29.2 --activate

      - name: Install Dependencies
        run: pnpm install

      - name: Build Windows
        run: pnpm build:win

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            desktop/dist-release/*.exe
            desktop/dist-release/*.zip
            desktop/dist-release/*.blockmap
            desktop/dist-release/latest*.yml
